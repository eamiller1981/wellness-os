<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5eae3">
  <title>Favicon Preview | Wellness OS</title>
  <style>
    :root {
      --bg: #f5eae3;
      --ink: #806f64;
      --muted: #a39289;
      --line: rgba(128, 111, 100, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 400;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f5eae3;
    }
  </style>
</head>
<body>
  <main>
    <h1>Favicon Preview</h1>
    <p>Option 1.5: warm icon silhouettes with dark pink accents. Preview only; these icons are not wired into the app yet.</p>
    <img src="assets/favicons/previews/option-1-5-contact-sheet.png?v=dark-pink" alt="Wellness OS favicon option 1.5 contact sheet">
  </main>
</body>
</html>
