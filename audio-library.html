<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5eae3">
  <title>Audio Library | Wellness OS</title>
  <link rel="stylesheet" href="space.css">
  <link rel="icon" href="assets/favicons/reading.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicons/reading-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicons/reading-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script src="app-auth.js"></script>
  <style>
    .page { gap: 24px; }

    .page-header {
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .page-header h1 {
      margin: 0 0 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.9rem;
      font-weight: 400;
      color: var(--ink);
    }
    .page-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .toolbar input,
    .toolbar select {
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--ink);
      font: inherit;
    }
    .toolbar select {
      padding-right: 30px;
      background-image: linear-gradient(45deg, transparent 50%, var(--ink) 50%),
                        linear-gradient(135deg, var(--ink) 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      appearance: none;
      -webkit-appearance: none;
    }
    .toolbar input { flex: 1; min-width: 180px; }
    .toolbar-meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-left: auto;
    }

    .shelf {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .audiobook-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      transition: border-color 0.15s, transform 0.15s;
    }
    .audiobook-card:hover { border-color: #5f514a; }

    .ab-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .ab-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.18rem;
      color: var(--ink);
      line-height: 1.25;
    }
    .ab-author {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .ab-rating {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgba(120, 130, 170, 0.18);
      color: #3f4878;
      white-space: nowrap;
    }
    .ab-rating.tier-loved   { background: rgba(170, 95, 180, 0.18); color: #6e3a78; }
    .ab-rating.tier-vg      { background: rgba(95, 140, 95, 0.18); color: #3f6238; }
    .ab-rating.tier-okay    { background: rgba(180, 150, 90, 0.18); color: #715a26; }
    .ab-rating.tier-notgood { background: rgba(180, 110, 80, 0.18); color: #794327; }
    .ab-rating.tier-dnf     { background: rgba(180, 70, 70, 0.18); color: #7a2828; }

    .ab-status {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ab-status.Reading  { background: rgba(120, 130, 170, 0.18); color: #3f4878; }
    .ab-status.TBR      { background: rgba(180, 150, 90, 0.18); color: #715a26; }
    .ab-status.Finished { background: rgba(95, 140, 95, 0.18); color: #3f6238; }
    .ab-status.DNF      { background: rgba(180, 70, 70, 0.18); color: #7a2828; }
    .ab-status.Unknown  { background: rgba(120, 110, 100, 0.18); color: #5f514a; }

    .ab-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .ab-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ab-tag {
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.72rem;
      background: rgba(255, 255, 255, 0.45);
      color: var(--ink);
    }

    .ab-summary {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--ink);
      opacity: 0.85;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ab-summary.expanded {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .ab-summary-toggle {
      align-self: flex-start;
      padding: 0;
      background: none;
      border: 0;
      color: #5f514a;
      cursor: pointer;
      font: inherit;
      font-size: 0.78rem;
      text-decoration: underline dotted;
    }

    .ab-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      font-size: 0.84rem;
      color: var(--muted);
    }
    .ab-footer .spacer { flex: 1; }

    .ab-toggle {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--ink);
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .ab-toggle:hover { border-color: #5f514a; }

    .ab-chapters {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .ab-card.open .ab-chapters { display: flex; }

    .ab-chapter {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 0 12px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .ab-chapter:hover { background: rgba(255, 255, 255, 0.85); border-color: #5f514a; }
    .ab-chapter.is-current {
      background: rgba(120, 130, 170, 0.16);
      border-color: #5f514a;
    }
    .ab-chapter.is-current .ab-chapter-title { font-weight: 600; }
    .ab-chapter-play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      color: var(--ink);
      font-size: 0.85rem;
      line-height: 1;
    }
    .ab-chapter.is-current.is-playing .ab-chapter-play::before { content: "❚❚"; }
    .ab-chapter.is-current:not(.is-playing) .ab-chapter-play::before { content: "▶"; }
    .ab-chapter:not(.is-current) .ab-chapter-play::before { content: "▶"; }
    .ab-chapter-title {
      font-size: 0.9rem;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ab-chapter-meta {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .ab-chapter-duration {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Resume signpost on the card with the last-played chapter */
    .audiobook-card.is-resume {
      border-color: #5f514a;
      box-shadow: 0 0 0 1px rgba(95, 81, 74, 0.25);
    }
    .ab-resume-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(95, 140, 95, 0.18);
      color: #3f6238;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 6px;
    }

    /* ------------------------------------------------------------------
       Floating now-playing player
       ------------------------------------------------------------------ */
    .player {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom)) 16px;
      background: rgba(245, 234, 227, 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);
      transform: translateY(100%);
      transition: transform 0.18s ease;
      font-size: 0.85rem;
    }
    .player.is-visible { transform: translateY(0); }
    body.player-active { padding-bottom: 130px; }

    .player-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      max-width: 880px;
      margin: 0 auto;
    }
    .player-meta {
      flex: 1 1 200px;
      min-width: 0;
    }
    .player-meta .player-book {
      color: var(--muted);
      font-size: 0.74rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-meta .player-chapter {
      color: var(--ink);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .player-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--ink);
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .player-btn:hover { border-color: #5f514a; }
    .player-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .player-btn.player-play {
      min-width: 44px;
      height: 40px;
      font-size: 1rem;
      background: #5f514a;
      color: #f5eae3;
      border-color: #5f514a;
    }
    .player-scrub {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 100%;
      order: 3;
    }
    .player-scrub input[type="range"] {
      flex: 1;
      accent-color: #5f514a;
    }
    .player-time {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.78rem;
      min-width: 44px;
      text-align: center;
    }
    .player-extras {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .player-select {
      padding: 6px 24px 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--ink);
      font: inherit;
      font-size: 0.78rem;
      appearance: none;
      -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--ink) 50%),
                        linear-gradient(135deg, var(--ink) 50%, transparent 50%);
      background-position: calc(100% - 12px) 50%, calc(100% - 8px) 50%;
      background-size: 4px 4px, 4px 4px;
      background-repeat: no-repeat;
    }
    .player-sleep-indicator {
      color: #3f6238;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .player-sleep-indicator[hidden] { display: none; }

    @media (max-width: 560px) {
      .player-extras { width: 100%; justify-content: flex-end; order: 4; }
      body.player-active { padding-bottom: 170px; }
    }

    .empty {
      padding: 30px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      text-align: center;
      color: var(--muted);
    }
    .empty a { color: var(--ink); }

    .loading {
      padding: 20px;
      color: var(--muted);
      font-style: italic;
    }

    .error {
      padding: 14px 18px;
      border: 1px solid rgba(180, 70, 70, 0.35);
      border-radius: var(--radius);
      background: rgba(180, 70, 70, 0.08);
      color: #7a2828;
      white-space: pre-wrap;
    }

    @media (max-width: 720px) {
      .shelf { grid-template-columns: 1fr; }
      .toolbar-meta { margin-left: 0; flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="Page">
      <a class="home-link" href="/">Home</a>
    </nav>

    <header class="page-header">
      <h1>Audio Library</h1>
      <p>EPUB → MP3 renders from the Colab pipeline. Each book inherits its status, rating, and tags from your reading log.</p>
    </header>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Search title or author…" autocomplete="off">
      <select id="statusFilter" aria-label="Filter by status">
        <option value="">All statuses</option>
        <option value="Reading">Reading</option>
        <option value="TBR">To Be Read</option>
        <option value="Finished">Finished</option>
        <option value="DNF">DNF</option>
        <option value="Unknown">Unmatched</option>
      </select>
      <span class="toolbar-meta" id="meta">Loading…</span>
    </div>

    <section id="shelf" class="shelf" aria-live="polite"></section>
  </main>

  <div id="player" class="player" role="region" aria-label="Audio player" aria-hidden="true">
    <div class="player-row">
      <div class="player-meta">
        <div class="player-book" id="playerBook">—</div>
        <div class="player-chapter" id="playerChapter">No chapter selected</div>
      </div>
      <div class="player-controls">
        <button class="player-btn" type="button" id="playerPrev" title="Previous chapter" aria-label="Previous chapter">⏮</button>
        <button class="player-btn" type="button" id="playerBack" title="Back 15 seconds" aria-label="Back 15 seconds">−15</button>
        <button class="player-btn player-play" type="button" id="playerPlay" title="Play / Pause" aria-label="Play">▶</button>
        <button class="player-btn" type="button" id="playerFwd" title="Forward 30 seconds" aria-label="Forward 30 seconds">+30</button>
        <button class="player-btn" type="button" id="playerNext" title="Next chapter" aria-label="Next chapter">⏭</button>
      </div>
      <div class="player-extras">
        <select class="player-select" id="playerSpeed" aria-label="Playback speed">
          <option value="0.85">0.85x</option>
          <option value="1" selected>1.0x</option>
          <option value="1.15">1.15x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="1.75">1.75x</option>
          <option value="2">2.0x</option>
        </select>
        <select class="player-select" id="playerSleep" aria-label="Sleep timer">
          <option value="0">Sleep: Off</option>
          <option value="chapter">End of chapter</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
        <span class="player-sleep-indicator" id="playerSleepIndicator" hidden></span>
      </div>
      <div class="player-scrub">
        <span class="player-time" id="playerCurTime">0:00</span>
        <input type="range" id="playerScrub" min="0" max="0" step="0.1" value="0" aria-label="Seek">
        <span class="player-time" id="playerDuration">0:00</span>
      </div>
    </div>
    <audio id="playerAudio" preload="metadata"></audio>
  </div>

  <script>
    const NOTION_WORKER = "https://notion-budget-manager.eamiller1981.workers.dev";
    const TTS_WORKER    = "https://tts.eamiller1981.workers.dev";
    const BOOKS_DB_ID   = "f75e04e67a7047408a6448f8879f0c29";

    const state = {
      books: new Map(),    // titleKey → reading-log book
      audio: new Map(),    // book name → { titleKey, chapters: [...] }
      open: new Set(),     // book names currently expanded
    };

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[m]));
    }

    function titleKey(t) {
      return String(t || "")
        .normalize("NFKD")
        .replace(/[\u2018\u2019]/g, "'")
        .replace(/[^a-z0-9]+/gi, "")
        .toLowerCase();
    }

    function plain(arr) {
      if (!Array.isArray(arr)) return "";
      return arr.map(t => t.plain_text || "").join("");
    }

    function ratingLabel(r) {
      if (r == null) return { text: "—", cls: "" };
      if (r >= 5)   return { text: "Loved · 5", cls: "tier-loved" };
      if (r >= 4)   return { text: "Very good · 4", cls: "tier-vg" };
      if (r >= 3)   return { text: "Okay · 3", cls: "tier-okay" };
      if (r >= 2)   return { text: "Not good · 2", cls: "tier-notgood" };
      return { text: "DNF · " + r, cls: "tier-dnf" };
    }

    function fmtDuration(sec) {
      const s = Math.max(0, Math.round(Number(sec) || 0));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const ss = s % 60;
      if (h) return `${h}h ${m}m`;
      if (m) return `${m}m ${ss}s`;
      return `${ss}s`;
    }

    // 1:23:45 / 4:32 — for inline position display.
    function fmtClock(sec) {
      const s = Math.max(0, Math.round(Number(sec) || 0));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const ss = s % 60;
      const mm = String(m).padStart(h ? 2 : 1, "0");
      const sss = String(ss).padStart(2, "0");
      return h ? `${h}:${mm}:${sss}` : `${mm}:${sss}`;
    }

    async function notionQuery(dbId) {
      const all = [];
      let cursor;
      do {
        const body = { page_size: 100 };
        if (cursor) body.start_cursor = cursor;
        const resp = await fetch(`${NOTION_WORKER}/notion/databases/${dbId}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!resp.ok) {
          throw new Error(`Notion query ${dbId} → ${resp.status}: ${(await resp.text()).slice(0, 200)}`);
        }
        const data = await resp.json();
        all.push(...(data.results || []));
        cursor = data.has_more ? data.next_cursor : undefined;
      } while (cursor);
      return all;
    }

    async function loadBooks() {
      const pages = await notionQuery(BOOKS_DB_ID);
      const out = new Map();
      for (const page of pages) {
        const p = page.properties || {};
        const title = plain(p.Title?.title) || "(untitled)";
        out.set(titleKey(title), {
          id: page.id,
          title,
          author: plain(p.Author?.rich_text) || "",
          status: p.Status?.select?.name || "",
          rating: typeof p.Rating?.number === "number" ? p.Rating.number : null,
          tags: (p.Tags?.multi_select || []).map(t => t.name),
          reflection: plain(p.Reflection?.rich_text),
          whyItFits: plain(p["Why It Fits"]?.rich_text),
          liked: plain(p.Liked?.rich_text),
        });
      }
      return out;
    }

    async function loadAudioLibrary() {
      // The worker's GET /api/tts/library is capped at 50. Query Notion directly
      // via the same proxy so we get the full list with pagination.
      const AUDIO_DB = "1a3a051608e8457d82042e05eb44fc84";
      const pages = await notionQuery(AUDIO_DB);
      // Dedupe by (book + section) keeping the most recent ready entry.
      // Different render runs (browser vs Colab) may leave duplicate rows;
      // we don't want to display the same chapter twice.
      const dedup = new Map(); // `${book}::${section || title}` → entry
      for (const page of pages) {
        const p = page.properties || {};
        const book = plain(p.Book?.rich_text) || "(unknown)";
        const status = p.Status?.select?.name || "";
        if (status !== "ready") continue;
        const sectionRaw = plain(p.Section?.rich_text) || "";
        const titleRaw = plain(p.Title?.title) || sectionRaw || "Untitled";
        const entry = {
          id: page.id,
          title: titleRaw,
          section: sectionRaw,
          voice: p.Voice?.select?.name || "",
          speed: p["Speed"]?.number ?? 0,
          durationSec: p["Duration sec"]?.number ?? 0,
          fileUrl: p["File URL"]?.url || "",
          created: page.created_time,
        };
        if (!entry.fileUrl) continue;
        const dedupKey = `${book}::${sectionRaw || titleRaw}`;
        const existing = dedup.get(dedupKey);
        if (!existing || String(entry.created).localeCompare(String(existing.created)) > 0) {
          dedup.set(dedupKey, { ...entry, book });
        }
      }
      // Group surviving entries by book.
      const byBook = new Map();
      for (const entry of dedup.values()) {
        const book = entry.book;
        if (!byBook.has(book)) {
          byBook.set(book, { titleKey: titleKey(book), name: book, chapters: [] });
        }
        byBook.get(book).chapters.push(entry);
      }
      // Sort chapters within each book by extracted index, then by created time.
      for (const entry of byBook.values()) {
        entry.chapters.sort((a, b) => {
          const na = Number((a.section.match(/(\d+)/) || [])[1]);
          const nb = Number((b.section.match(/(\d+)/) || [])[1]);
          if (Number.isFinite(na) && Number.isFinite(nb) && na !== nb) return na - nb;
          return String(a.created).localeCompare(String(b.created));
        });
        // Renumber sequentially based on render order. If the EPUB TOC stored
        // a meaningful chapter name (anything other than "Section N"), prefer it.
        entry.chapters.forEach((c, idx) => {
          const isGenericSection = /^\s*section\s*\d+\s*$/i.test(c.section);
          if (c.section && !isGenericSection) {
            c.displayTitle = c.section;
          } else {
            c.displayTitle = `Chapter ${idx + 1}`;
          }
        });
      }
      return byBook;
    }

    function bookCardHtml(audioEntry) {
      const reading = state.books.get(audioEntry.titleKey);
      const status = reading?.status || "Unknown";
      const author = reading?.author || "";
      const rating = ratingLabel(reading?.rating);
      const tags = reading?.tags || [];
      const summary = (reading?.reflection || reading?.whyItFits || reading?.liked || "").trim();

      const totalSec = audioEntry.chapters.reduce((s, c) => s + (Number(c.durationSec) || 0), 0);
      const isOpen = state.open.has(audioEntry.name);

      const tagsHtml = tags.length
        ? `<div class="ab-tags">${tags.slice(0, 6).map(t => `<span class="ab-tag">${escapeHtml(t)}</span>`).join("")}</div>`
        : "";

      const isResume = lastPlayed && lastPlayed.book === audioEntry.name;
      const chaptersHtml = audioEntry.chapters.map((c, idx) => {
        const saved = Number(positions[c.id]) || 0;
        const dur = Number(c.durationSec) || 0;
        const isResumeChapter = isResume && lastPlayed.chapterId === c.id;
        const isFinished = dur > 0 && saved > 0 && saved >= dur - 5;
        let meta = "";
        if (isResumeChapter && saved > 0) {
          meta = `<div class="ab-chapter-meta">Resume at ${fmtClock(saved)}</div>`;
        } else if (isFinished) {
          meta = `<div class="ab-chapter-meta">Finished</div>`;
        } else if (saved > 5) {
          meta = `<div class="ab-chapter-meta">${fmtClock(saved)} in</div>`;
        }
        return `
        <div class="ab-chapter" role="button" tabindex="0" data-chapter-index="${idx}" data-chapter-id="${escapeHtml(c.id)}">
          <span class="ab-chapter-play" aria-hidden="true"></span>
          <div>
            <div class="ab-chapter-title">${escapeHtml(c.displayTitle)}</div>
            ${meta}
          </div>
          <div class="ab-chapter-duration">${fmtDuration(c.durationSec)}</div>
        </div>
        `;
      }).join("");

      return `
        <article class="audiobook-card ab-card ${isOpen ? "open" : ""} ${isResume ? "is-resume" : ""}" data-book="${escapeHtml(audioEntry.name)}">
          <div class="ab-head">
            <div>
              <h3 class="ab-title">${escapeHtml(audioEntry.name)}${isResume ? `<span class="ab-resume-tag">Resume</span>` : ""}</h3>
              ${author ? `<div class="ab-author">${escapeHtml(author)}</div>` : ""}
            </div>
            <div class="ab-rating ${rating.cls}">${escapeHtml(rating.text)}</div>
          </div>
          <div class="ab-meta">
            <span class="ab-status ${escapeHtml(status)}">${escapeHtml(status === "Unknown" ? "Not in log" : status)}</span>
            ${tagsHtml}
          </div>
          ${summary ? `
            <p class="ab-summary" data-summary>${escapeHtml(summary)}</p>
            <button type="button" class="ab-summary-toggle" data-action="toggle-summary" hidden>Show more</button>
          ` : ""}
          <div class="ab-footer">
            <span>${audioEntry.chapters.length} chapter${audioEntry.chapters.length === 1 ? "" : "s"} · ${fmtDuration(totalSec)}</span>
            <span class="spacer"></span>
            <button type="button" class="ab-toggle" data-action="toggle-chapters">${isOpen ? "Hide chapters" : "Show chapters"}</button>
          </div>
          <div class="ab-chapters">${chaptersHtml}</div>
        </article>
      `;
    }

    function render() {
      const search = document.getElementById("search").value.trim().toLowerCase();
      const statusFilter = document.getElementById("statusFilter").value;
      const shelf = document.getElementById("shelf");
      const meta = document.getElementById("meta");

      const all = [...state.audio.values()];
      const filtered = all.filter(entry => {
        const reading = state.books.get(entry.titleKey);
        const status = reading?.status || "Unknown";
        if (statusFilter && statusFilter !== status) return false;
        if (search) {
          const hay = `${entry.name} ${reading?.author || ""}`.toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });

      filtered.sort((a, b) => {
        const aMatched = state.books.has(a.titleKey) ? 0 : 1;
        const bMatched = state.books.has(b.titleKey) ? 0 : 1;
        if (aMatched !== bMatched) return aMatched - bMatched;
        return a.name.localeCompare(b.name);
      });

      if (filtered.length === 0) {
        shelf.innerHTML = `<div class="empty">No audiobooks match. Render one in <a href="/audio-render">EPUB to MP3</a>.</div>`;
      } else {
        shelf.innerHTML = filtered.map(bookCardHtml).join("");
        // After render, hide the show-more button for summaries that don't overflow.
        shelf.querySelectorAll(".audiobook-card").forEach(card => {
          const summary = card.querySelector("[data-summary]");
          const toggle = card.querySelector("[data-action='toggle-summary']");
          if (!summary || !toggle) return;
          if (summary.scrollHeight > summary.clientHeight + 2) {
            toggle.hidden = false;
          }
        });
      }

      meta.textContent = `${filtered.length} of ${all.length} book${all.length === 1 ? "" : "s"}`;
    }

    // ------------------------------------------------------------------
    // Persistence: per-chapter playback position + last-played pointer + speed
    // ------------------------------------------------------------------
    const POSITION_KEY    = "audioLibrary.positions";   // { chapterId: seconds }
    const LAST_PLAYED_KEY = "audioLibrary.lastPlayed";  // { book, chapterId, position }
    const SPEED_KEY       = "audioLibrary.speed";       // number string
    const POSITION_SAVE_THROTTLE_MS = 1500;

    let positions  = {};
    let lastPlayed = null;
    try { positions  = JSON.parse(localStorage.getItem(POSITION_KEY)    || "{}"); } catch { positions  = {}; }
    try { lastPlayed = JSON.parse(localStorage.getItem(LAST_PLAYED_KEY) || "null"); } catch { lastPlayed = null; }

    function persistPositions() {
      try { localStorage.setItem(POSITION_KEY, JSON.stringify(positions)); }
      catch (err) { console.warn("position save failed", err); }
    }
    function persistLastPlayed() {
      try { localStorage.setItem(LAST_PLAYED_KEY, JSON.stringify(lastPlayed)); }
      catch (err) { console.warn("lastPlayed save failed", err); }
    }
    function persistSpeed(s) {
      try { localStorage.setItem(SPEED_KEY, String(s)); } catch {}
    }
    function loadSpeed() {
      const raw = localStorage.getItem(SPEED_KEY);
      const n = Number(raw);
      return Number.isFinite(n) && n >= 0.5 && n <= 3 ? n : 1;
    }

    // ------------------------------------------------------------------
    // Floating now-playing player
    // ------------------------------------------------------------------
    const player = (() => {
      const el = {
        root:        document.getElementById("player"),
        audio:       document.getElementById("playerAudio"),
        book:        document.getElementById("playerBook"),
        chapter:     document.getElementById("playerChapter"),
        play:        document.getElementById("playerPlay"),
        prev:        document.getElementById("playerPrev"),
        next:        document.getElementById("playerNext"),
        back:        document.getElementById("playerBack"),
        fwd:         document.getElementById("playerFwd"),
        scrub:       document.getElementById("playerScrub"),
        curTime:     document.getElementById("playerCurTime"),
        duration:    document.getElementById("playerDuration"),
        speed:       document.getElementById("playerSpeed"),
        sleep:       document.getElementById("playerSleep"),
        sleepBadge:  document.getElementById("playerSleepIndicator"),
      };

      const ctx = {
        book: null,        // book name
        bookEntry: null,   // { name, chapters: [...] }
        chapterIndex: -1,
        chapter: null,     // { id, displayTitle, fileUrl, durationSec }
        seeking: false,
        lastSaveAt: 0,
        sleepMode: "off",  // "off" | "chapter" | "minutes"
        sleepTimer: null,
        sleepDeadline: 0,
        endOfChapterSleep: false,
      };

      function show() {
        el.root.classList.add("is-visible");
        el.root.setAttribute("aria-hidden", "false");
        document.body.classList.add("player-active");
      }

      function updatePlayPauseUI() {
        const playing = !el.audio.paused && !el.audio.ended;
        el.play.textContent = playing ? "❚❚" : "▶";
        el.play.setAttribute("aria-label", playing ? "Pause" : "Play");
        // Update chapter row UI
        document.querySelectorAll(".ab-chapter.is-current").forEach(row => {
          row.classList.toggle("is-playing", playing);
        });
      }

      function updateChapterHighlights() {
        document.querySelectorAll(".ab-chapter").forEach(row => {
          row.classList.remove("is-current", "is-playing");
        });
        if (!ctx.chapter) return;
        const card = document.querySelector(`.audiobook-card[data-book="${cssEscape(ctx.book)}"]`);
        if (!card) return;
        const row = card.querySelector(`.ab-chapter[data-chapter-id="${cssEscape(ctx.chapter.id)}"]`);
        if (row) {
          row.classList.add("is-current");
          if (!el.audio.paused && !el.audio.ended) row.classList.add("is-playing");
        }
      }

      function updatePrevNextDisabled() {
        const chapters = ctx.bookEntry?.chapters || [];
        el.prev.disabled = ctx.chapterIndex <= 0;
        el.next.disabled = ctx.chapterIndex < 0 || ctx.chapterIndex >= chapters.length - 1;
      }

      function load(bookName, chapterIndex, opts = {}) {
        const entry = state.audio.get(bookName);
        if (!entry) return;
        const chapter = entry.chapters[chapterIndex];
        if (!chapter) return;

        ctx.book = bookName;
        ctx.bookEntry = entry;
        ctx.chapterIndex = chapterIndex;
        ctx.chapter = chapter;

        el.book.textContent = bookName;
        el.chapter.textContent = chapter.displayTitle;
        el.audio.src = chapter.fileUrl;
        el.audio.playbackRate = Number(el.speed.value) || 1;

        const resumeAt = opts.resumeAt != null
          ? opts.resumeAt
          : (Number(positions[chapter.id]) || 0);

        // Apply resume position once metadata arrives.
        const applyResume = () => {
          const dur = el.audio.duration;
          if (Number.isFinite(dur) && resumeAt > 0 && resumeAt < dur - 5) {
            try { el.audio.currentTime = resumeAt; } catch {}
          }
          el.scrub.max = Number.isFinite(dur) ? String(dur) : "0";
          el.duration.textContent = Number.isFinite(dur) ? fmtClock(dur) : "0:00";
        };
        if (el.audio.readyState >= 1) {
          applyResume();
        } else {
          el.audio.addEventListener("loadedmetadata", applyResume, { once: true });
        }

        lastPlayed = { book: bookName, chapterId: chapter.id, position: resumeAt };
        persistLastPlayed();

        show();
        updateChapterHighlights();
        updatePrevNextDisabled();
        updatePlayPauseUI();

        if (opts.autoplay !== false) {
          el.audio.play().catch(err => console.warn("play failed", err));
        }
      }

      function togglePlay() {
        if (!ctx.chapter) return;
        if (el.audio.paused) el.audio.play().catch(err => console.warn("play failed", err));
        else el.audio.pause();
      }

      function gotoNext() {
        if (!ctx.bookEntry) return;
        if (ctx.chapterIndex >= ctx.bookEntry.chapters.length - 1) return;
        load(ctx.book, ctx.chapterIndex + 1, { resumeAt: 0 });
      }
      function gotoPrev() {
        if (!ctx.bookEntry) return;
        if (ctx.chapterIndex <= 0) return;
        load(ctx.book, ctx.chapterIndex - 1, { resumeAt: 0 });
      }

      function setSleep(value) {
        clearSleep();
        if (value === "0" || !value) return;
        if (value === "chapter") {
          ctx.endOfChapterSleep = true;
          el.sleepBadge.hidden = false;
          el.sleepBadge.textContent = "Sleep: end of chapter";
          return;
        }
        const mins = Number(value);
        if (!Number.isFinite(mins) || mins <= 0) return;
        ctx.sleepDeadline = Date.now() + mins * 60_000;
        el.sleepBadge.hidden = false;
        updateSleepBadge();
        ctx.sleepTimer = setInterval(() => {
          const remaining = ctx.sleepDeadline - Date.now();
          if (remaining <= 0) {
            el.audio.pause();
            clearSleep();
            el.sleep.value = "0";
          } else {
            updateSleepBadge();
          }
        }, 1000);
      }
      function clearSleep() {
        ctx.endOfChapterSleep = false;
        if (ctx.sleepTimer) { clearInterval(ctx.sleepTimer); ctx.sleepTimer = null; }
        ctx.sleepDeadline = 0;
        el.sleepBadge.hidden = true;
        el.sleepBadge.textContent = "";
      }
      function updateSleepBadge() {
        const remaining = ctx.sleepDeadline - Date.now();
        if (remaining <= 0) return;
        const mm = Math.floor(remaining / 60_000);
        const ss = Math.floor((remaining % 60_000) / 1000);
        el.sleepBadge.textContent = `Sleep: ${mm}:${String(ss).padStart(2, "0")}`;
      }

      // Wire DOM events
      el.play.addEventListener("click", togglePlay);
      el.prev.addEventListener("click", gotoPrev);
      el.next.addEventListener("click", gotoNext);
      el.back.addEventListener("click", () => {
        if (!ctx.chapter) return;
        el.audio.currentTime = Math.max(0, el.audio.currentTime - 15);
      });
      el.fwd.addEventListener("click", () => {
        if (!ctx.chapter) return;
        const dur = el.audio.duration;
        el.audio.currentTime = Math.min(Number.isFinite(dur) ? dur : el.audio.currentTime + 30,
                                         el.audio.currentTime + 30);
      });
      el.speed.addEventListener("change", () => {
        const rate = Number(el.speed.value) || 1;
        el.audio.playbackRate = rate;
        persistSpeed(rate);
      });
      el.sleep.addEventListener("change", () => setSleep(el.sleep.value));

      el.scrub.addEventListener("input", () => { ctx.seeking = true; });
      el.scrub.addEventListener("change", () => {
        const val = Number(el.scrub.value);
        if (Number.isFinite(val)) el.audio.currentTime = val;
        ctx.seeking = false;
      });

      el.audio.addEventListener("loadedmetadata", () => {
        const dur = el.audio.duration;
        el.scrub.max = Number.isFinite(dur) ? String(dur) : "0";
        el.duration.textContent = Number.isFinite(dur) ? fmtClock(dur) : "0:00";
      });
      el.audio.addEventListener("timeupdate", () => {
        if (!ctx.chapter) return;
        if (!ctx.seeking) {
          el.scrub.value = String(el.audio.currentTime);
          el.curTime.textContent = fmtClock(el.audio.currentTime);
        }
        const now = Date.now();
        if (now - ctx.lastSaveAt >= POSITION_SAVE_THROTTLE_MS) {
          ctx.lastSaveAt = now;
          positions[ctx.chapter.id] = el.audio.currentTime;
          persistPositions();
          if (lastPlayed && lastPlayed.chapterId === ctx.chapter.id) {
            lastPlayed.position = el.audio.currentTime;
            persistLastPlayed();
          }
        }
      });
      el.audio.addEventListener("play",  updatePlayPauseUI);
      el.audio.addEventListener("pause", updatePlayPauseUI);
      el.audio.addEventListener("ended", () => {
        if (ctx.chapter) {
          delete positions[ctx.chapter.id];
          persistPositions();
        }
        if (ctx.endOfChapterSleep) {
          clearSleep();
          el.sleep.value = "0";
          updatePlayPauseUI();
          return;
        }
        // Autoplay next chapter
        if (ctx.bookEntry && ctx.chapterIndex < ctx.bookEntry.chapters.length - 1) {
          load(ctx.book, ctx.chapterIndex + 1, { resumeAt: 0 });
        } else {
          updatePlayPauseUI();
        }
      });
      el.audio.addEventListener("error", () => {
        console.warn("audio error", el.audio.error);
        el.chapter.textContent = `${ctx.chapter?.displayTitle || "Chapter"} — playback error`;
      });

      // Keyboard shortcuts (when not typing in an input)
      document.addEventListener("keydown", (e) => {
        if (e.target.matches("input, textarea, select")) return;
        if (e.code === "Space") { e.preventDefault(); togglePlay(); }
        else if (e.code === "ArrowLeft")  { e.preventDefault(); el.audio.currentTime = Math.max(0, el.audio.currentTime - 5); }
        else if (e.code === "ArrowRight") { e.preventDefault(); el.audio.currentTime = el.audio.currentTime + 5; }
      });

      // Init speed from storage
      const savedSpeed = loadSpeed();
      el.speed.value = String(savedSpeed);
      el.audio.playbackRate = savedSpeed;

      return {
        load,
        refreshHighlights: updateChapterHighlights,
      };
    })();

    // cssEscape — quote a value for use in an attribute selector. Newer browsers
    // expose CSS.escape; provide a minimal fallback otherwise.
    function cssEscape(s) {
      if (window.CSS && CSS.escape) return CSS.escape(String(s));
      return String(s).replace(/["\\]/g, "\\$&");
    }

    function attachEventDelegation() {
      const shelf = document.getElementById("shelf");

      shelf.addEventListener("click", (e) => {
        // Chapter-row click → play that chapter
        const chapterRow = e.target.closest(".ab-chapter");
        if (chapterRow) {
          const card = chapterRow.closest(".audiobook-card");
          const book = card?.dataset.book;
          const idx  = Number(chapterRow.dataset.chapterIndex);
          if (book && Number.isFinite(idx)) {
            player.load(book, idx);
          }
          return;
        }
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const card = btn.closest(".audiobook-card");
        if (!card) return;
        const book = card.dataset.book;
        if (btn.dataset.action === "toggle-chapters") {
          if (state.open.has(book)) state.open.delete(book);
          else state.open.add(book);
          card.classList.toggle("open");
          btn.textContent = state.open.has(book) ? "Hide chapters" : "Show chapters";
        } else if (btn.dataset.action === "toggle-summary") {
          const summary = card.querySelector("[data-summary]");
          if (!summary) return;
          const expanded = summary.classList.toggle("expanded");
          btn.textContent = expanded ? "Show less" : "Show more";
        }
      });

      // Keyboard activation for chapter rows
      shelf.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const row = e.target.closest?.(".ab-chapter");
        if (!row) return;
        e.preventDefault();
        row.click();
      });

      document.getElementById("search").addEventListener("input", render);
      document.getElementById("statusFilter").addEventListener("change", render);
    }

    // Open the resume-card's chapter list + scroll into view after first render.
    function applyResumeSignpost() {
      if (!lastPlayed?.book) return;
      const entry = state.audio.get(lastPlayed.book);
      if (!entry) return;
      state.open.add(lastPlayed.book);
      // Re-render with the card open
      render();
      requestAnimationFrame(() => {
        const card = document.querySelector(`.audiobook-card[data-book="${cssEscape(lastPlayed.book)}"]`);
        card?.scrollIntoView({ block: "start", behavior: "smooth" });
      });
    }

    async function init() {
      const shelf = document.getElementById("shelf");
      shelf.innerHTML = `<div class="loading">Loading your audio library…</div>`;
      try {
        const [books, audio] = await Promise.all([loadBooks(), loadAudioLibrary()]);
        state.books = books;
        state.audio = audio;
        render();
        applyResumeSignpost();
      } catch (err) {
        shelf.innerHTML = `<div class="error">Failed to load: ${escapeHtml(err.message)}</div>`;
        document.getElementById("meta").textContent = "Error";
        console.error(err);
      }
    }

    let initStarted = false;
    function safeInit() {
      if (initStarted) return;
      initStarted = true;
      init();
    }

    attachEventDelegation();
    window.addEventListener("wellness-auth-ready", safeInit, { once: true });
    // If auth was already ready before the listener attached, kick off anyway.
    if (window.localStorage.getItem("wellnessAuthToken")) {
      setTimeout(safeInit, 0);
    }
  </script>
</body>
</html>
