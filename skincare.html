<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7efe8">
  <meta name="description" content="Tonight's skincare routine inside Wellness OS.">
  <title>Skincare | Wellness OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7efe8;
      --paper: #fffaf6;
      --ink: #403534;
      --muted: #8f7c78;
      --muted-soft: #b8a7a1;
      --line: rgba(115, 91, 84, 0.14);
      --rose: #caaba6;
      --rose-soft: #f3dfd8;
      --sage: #a3b5a6;
      --sage-soft: #dce6dd;
      --wisteria: #c6abd1;
      --wisteria-soft: #ede3f2;
      --amber: #d8c3a1;
      --amber-soft: #f2eadb;
      --shadow: 0 16px 34px rgba(104, 79, 71, 0.08);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --sans: "Outfit", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --script: "Great Vibes", cursive;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(202, 171, 166, 0.2), transparent 34%),
        linear-gradient(180deg, #fbf4ef 0%, var(--bg) 28%, #f4ece5 100%);
      color: var(--ink);
      font-family: var(--sans);
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(100%, 440px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 14px 30px;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .home-link {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 250, 246, 0.66);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .home-link:hover,
    .home-link:focus-visible,
    .mode-pill:hover,
    .mode-pill:focus-visible,
    .action-button:hover,
    .action-button:focus-visible,
    .log-card:hover,
    .log-card:focus-visible,
    .next-link:hover,
    .next-link:focus-visible {
      outline: none;
      transform: translateY(-1px);
    }

    .hero {
      padding: 0;
      text-align: center;
      border-radius: 28px;
      background: rgba(255, 250, 246, 0.88);
      box-shadow: var(--shadow);
      animation: fade-up 0.55s ease both;
      overflow: hidden;
    }

    .hero-image {
      aspect-ratio: 2.95 / 1;
      width: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #f3e7e0;
    }

    .panel,
    .actions,
    .note,
    .log-card {
      margin-top: 12px;
      border-radius: 22px;
      background: rgba(255, 250, 246, 0.9);
      box-shadow: var(--shadow);
      animation: fade-up 0.55s ease both;
    }

    .status-panel {
      margin-top: 12px;
      padding: 12px 14px;
      border-left: 3px solid var(--rose);
      border-radius: 0 18px 18px 0;
      background: rgba(243, 223, 216, 0.32);
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .status-panel[hidden] {
      display: none;
    }

    .panel {
      padding: 18px 16px;
    }

    .cycle-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .cycle-name {
      margin-top: 0;
      font-size: 0.96rem;
      font-weight: 700;
    }

    .cycle-meta {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .progress-track {
      height: 7px;
      border-radius: 999px;
      background: rgba(115, 91, 84, 0.09);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--sage), #8fa791);
      transition: width 0.45s ease;
    }

    .mode-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 14px;
      padding: 4px;
      border-radius: 14px;
      background: rgba(115, 91, 84, 0.07);
    }

    .mode-pill {
      min-height: 38px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted-soft);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .mode-pill.active {
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(104, 79, 71, 0.08);
    }

    .mode-pill:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .routine-title {
      margin: 18px 0 0;
      padding-top: 18px;
      text-align: center;
      animation: fade-up 0.55s ease 0.08s both;
    }

    .routine-title h2 {
      margin: 0;
      font-family: var(--script);
      font-size: 2.45rem;
      font-weight: 400;
      line-height: 1;
      color: var(--ink);
    }

    .view-context {
      margin: 10px 0 0;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .routine-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin-top: 8px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--sage-soft);
      color: #5f7862;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .step-panel {
      padding: 10px 16px 6px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted-soft);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .section-header::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .section-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .step-list {
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
    }

    .step-row {
      width: 100%;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      transition: opacity 0.2s ease;
    }

    .step-row:last-child {
      border-bottom: 0;
    }

    .step-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--step-color, var(--rose-soft));
      color: var(--ink);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .step-name {
      display: block;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.28;
    }

    .step-type {
      display: block;
      margin-top: 3px;
      color: var(--muted-soft);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .step-notes {
      display: none;
    }

    .step-empty {
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .note {
      padding: 12px 16px;
      background: rgba(243, 223, 216, 0.32);
      border-left: 3px solid var(--rose);
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .note p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .next-section {
      padding: 16px;
    }

    .next-label {
      margin: 0 0 10px;
      color: var(--muted-soft);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .next-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .next-card {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 250, 246, 0.72);
      box-shadow: inset 0 0 0 1px rgba(115, 91, 84, 0.06);
    }

    .next-card-title {
      display: block;
      color: var(--muted-soft);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .next-card-name {
      display: block;
      margin-top: 6px;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--ink);
    }

    .next-link {
      width: 100%;
      min-height: 50px;
      margin-top: 12px;
      border: 1px solid rgba(115, 91, 84, 0.08);
      border-radius: 16px;
      background: rgba(255, 250, 246, 0.74);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .actions {
      padding: 18px 16px 16px;
    }

    .action-section-title {
      margin: 0 0 12px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
    }

    .action-grid {
      display: grid;
      gap: 10px;
    }

    .action-grid.primary {
      grid-template-columns: repeat(3, 1fr);
    }

    .action-grid.secondary {
      grid-template-columns: repeat(3, 1fr);
      margin-top: 10px;
    }

    .action-grid.featured {
      grid-template-columns: 1fr;
      margin-bottom: 10px;
    }

    .action-button {
      min-height: 96px;
      padding: 10px 8px 12px;
      border: 1px solid rgba(115, 91, 84, 0.06);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 250, 246, 0.62), rgba(255, 250, 246, 0.9)),
        var(--action-bg, rgba(243, 223, 216, 0.4));
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      overflow: hidden;
      position: relative;
    }

    .action-button:disabled {
      cursor: default;
      opacity: 0.52;
      transform: none;
    }

    .action-button.featured {
      min-height: 74px;
      flex-direction: row;
      justify-content: flex-start;
      gap: 12px;
      padding: 14px 16px;
    }

    .action-button.featured .action-label {
      font-size: 0.78rem;
      text-align: left;
    }

    .action-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 250, 246, 0.72);
      box-shadow: inset 0 0 0 1px rgba(115, 91, 84, 0.06);
      color: var(--ink);
      line-height: 1;
    }

    .action-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-label {
      font-size: 0.69rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .log-card {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.2s ease;
      background: rgba(243, 223, 216, 0.4);
      box-shadow: none;
    }

    .log-card[disabled] {
      cursor: default;
      opacity: 0.72;
    }

    .log-mark {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 250, 246, 0.7);
      color: #b1837f;
      font-size: 0.94rem;
      font-weight: 600;
      flex: 0 0 auto;
    }

    .log-title {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .log-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: normal;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translate(-50%, 14px);
      width: min(calc(100% - 28px), 340px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(64, 53, 52, 0.95);
      color: #fffaf6;
      text-align: center;
      font-size: 0.84rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 680px) {
      .page {
        width: min(100%, 460px);
        padding: 18px 18px 42px;
      }

      .hero-image {
        aspect-ratio: 3.1 / 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/2.png">
  <script src="app-auth.js?v=20260429e"></script>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="Page">
      <a class="home-link" href="index.html">Home</a>
    </nav>

    <section>
      <header class="hero">
        <img class="hero-image" src="assets/todays-skincare-routine-banner.png" alt="Today's Skincare Routine">
      </header>

      <div class="status-panel" id="statusPanel" hidden></div>

      <section class="panel" aria-label="Cycle status">
        <div class="cycle-head">
          <div>
            <strong class="cycle-name" id="cycleName">Skincare Cycle</strong>
          </div>
            <span class="cycle-meta" id="cycleMeta">Loading...</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="mode-toggle" id="modeToggle" aria-label="Routine mode"></div>
      </section>

        <section class="routine-title" aria-label="Tonight's steps">
         <h2 id="blockName">&nbsp;</h2>
        <p class="view-context" id="viewContext" hidden></p>
        <span class="routine-tag" id="deviceBadge" hidden></span>
      </section>

      <section class="panel step-panel" aria-label="Routine steps">
        <div id="stepSections"></div>
      </section>

        <aside class="note" aria-label="Routine note">
         <p id="blockNote"></p>
      </aside>

      <section class="panel next-section" aria-label="Next up">
        <p class="next-label">Next</p>
        <div class="next-items">
          <div class="next-card">
            <span class="next-card-title">Steps</span>
              <span class="next-card-name" id="nextBlockName"></span>
          </div>
          <div class="next-card">
            <span class="next-card-title">Device</span>
              <span class="next-card-name" id="nextDeviceName"></span>
          </div>
        </div>
        <a class="next-link" href="skincare-routine.html" id="routineLink">View 90 Day Routine</a>
      </section>

      <section class="actions" aria-label="Quick actions">
        <p class="action-section-title">Quick actions</p>
        <div class="action-grid featured" id="featuredActions"></div>
        <div class="action-grid primary" id="primaryActions"></div>
        <div class="action-grid secondary" id="secondaryActions"></div>
      </section>

      <button class="log-card" id="logCard" type="button">
        <span class="log-mark">&#10003;</span>
        <span>
            <span class="log-title" id="logTitle">Loading last night...</span>
            <span class="log-meta" id="logMeta"></span>
        </span>
      </button>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const API_BASE = "https://skincare.eamiller1981.workers.dev";

    const MODE_LABELS = {
      cycle: "Cycle",
      minimal: "Minimal",
      travel: "Travel"
    };

    const SECTION_STYLES = {
      base: { label: "Base", color: "#e9dfd6" },
      device: { label: "Device", color: "#ede3f2" },
      steps: { label: "Steps", color: "#dce6dd" },
      block: { label: "Steps", color: "#dce6dd" },
      treatment: { label: "Device", color: "#ede3f2" }
    };

    const FALLBACK_PAYLOAD = {

        name: "Skincare Cycle",
        nightNumber: 0,
        totalNights: 0,

      },

      },

    const LOADING_PAYLOAD = {
      mode: "cycle",
      cycle: {
        name: "Skincare Cycle",
        nightNumber: 0,
        totalNights: 0,
        progressPercent: 0
      },
      routine: {

        devices: [],
        note: "",
        sections: []
      },
      next: {
        blockName: "",
        deviceNames: []
      },
      yesterday: {
        log: null
      }
    };

    const FALLBACK_PLAN_ROWS = [
      {
        id: "fallback-unavailable",
        night: "Unavailable",
        nightOrder: 0,
        date: "",
        phase: "",
        stepGroups: [],
        steps: [],
        intensityTier: 0,
        isToday: true
      }
    ];

    const icon = {
      coach: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3l1.9 4.4L18 9.3l-4.1 1.9L12 16l-1.9-4.8L6 9.3l4.1-1.9z"></path>

      `,
      back: `

      `,

        </svg>
      `,
      progress: `

      `,
      treatments: `

          <path d="M9 20h6"></path>
        </svg>
      `
    };

    const SECONDARY_ACTION_ITEMS = [
      { label: "Products", icon: icon.products, color: "#f2eadb", href: "products.html" },
      { label: "Progress", icon: icon.progress, color: "#dce6dd", href: "progress.html" },
      { label: "Treatments", icon: icon.treatments, color: "#f3dfd8", href: "treatments.html" }
    ];

    const state = {
      mode: "cycle",
      payload: null,
      usingFallback: false,
      loadingInitial: true,
      syncingMode: false,
      loadingSelection: false,
      planRows: [],
      activeAssignmentId: "",
      todayAssignmentId: "",
      previewCache: new Map(),
      prefetching: new Set()
    };

    const cycleName = document.getElementById("cycleName");
    const cycleMeta = document.getElementById("cycleMeta");
    const progressFill = document.getElementById("progressFill");
    const blockName = document.getElementById("blockName");
    const viewContext = document.getElementById("viewContext");
    const deviceBadge = document.getElementById("deviceBadge");
    const blockNote = document.getElementById("blockNote");
    const stepSections = document.getElementById("stepSections");
    const modeToggle = document.getElementById("modeToggle");
    const featuredActions = document.getElementById("featuredActions");
    const primaryActions = document.getElementById("primaryActions");
    const secondaryActions = document.getElementById("secondaryActions");
    const toast = document.getElementById("toast");
    const logCard = document.getElementById("logCard");
    const logTitle = document.getElementById("logTitle");
    const logMeta = document.getElementById("logMeta");
    const statusPanel = document.getElementById("statusPanel");
    const nextBlockName = document.getElementById("nextBlockName");
    const nextDeviceName = document.getElementById("nextDeviceName");

    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function showStatus(message) {
      statusPanel.hidden = false;
      statusPanel.textContent = message;
    }

    function hideStatus() {
      statusPanel.hidden = true;
      statusPanel.textContent = "";
    }

    function fallbackStatusMessage(message) {
      if (!message) {
        return "Live skincare data could not load yet.";
      }

      if (/unauthorized/i.test(message)) {
        return "Unlock Wellness OS to load your live skincare routine.";
      }

      return message;
    }

    function formatShortDate(dateString) {
      if (!dateString) return "Date not set";

      try {
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "numeric"
        }).format(new Date(`${dateString}T00:00:00`));
      } catch {
        return dateString;
      }
    }

    function uniqueOrdered(values) {
      const seen = new Set();
      return values.filter((value) => {
        if (!value || seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function clonePayload(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function cacheKey(assignmentId, mode) {
      return `${mode}:${assignmentId || "today"}`;
    }

    function rememberPreview(data) {
      if (data && data.assignment && data.assignment.id) {
        state.previewCache.set(cacheKey(data.assignment.id, data.mode || state.mode), clonePayload(data));
      }
    }

    function currentAssignment() {
      return (state.payload && state.payload.assignment) || {};
    }

    function currentPlanRow() {
      return state.planRows.find((row) => row.id === state.activeAssignmentId)
        || state.planRows.find((row) => row.id === state.todayAssignmentId)
        || state.planRows.find((row) => row.isToday)
        || state.planRows[0]
        || null;
    }

    function currentPlanIndex() {
      return state.planRows.findIndex((row) => row.id === (currentPlanRow() && currentPlanRow().id));
    }

    function isPreviewing() {
      return Boolean(state.activeAssignmentId && state.todayAssignmentId && state.activeAssignmentId !== state.todayAssignmentId);
    }

    function canPauseSelection() {
      const assignment = currentAssignment();
      if (!assignment.id || !assignment.date) return false;
      if (state.payload && state.payload.pause && state.payload.pause.active) return false;
      return !isPreviewing();
    }

    function routineDeviceNames(routine) {
      const declared = Array.isArray(routine && routine.devices) ? routine.devices : [];
      const fromSteps = ((routine && routine.sections) || [])
        .flatMap((section) => section.steps || [])
        .filter((step) => String(step.type || "").toLowerCase() === "tool")
        .map((step) => step.product || step.name || "");

      return uniqueOrdered([...declared, ...fromSteps]);
    }

    function nextDeviceText(next) {
      const nextDevices = Array.isArray(next && next.deviceNames)
        ? uniqueOrdered(next.deviceNames)
        : [];

      if (nextDevices.length) {
        return nextDevices.join(" / ");
      }

      if (next && next.deviceName) {
        return next.deviceName;
      }

      return next && next.blockName ? "No device" : "TBD";
    }

    function updateQuickActionButtons() {
      const currentIndex = currentPlanIndex();
      const hasPlan = state.planRows.length > 0;

      renderActions(featuredActions, [
        {
          label: "AI Coach",
          icon: icon.coach,
          color: "#ede3f2",
          onClick: () => showToast("AI Coach is on deck once the MVP logging flow is in place.")
        }
      ], true);

      renderActions(primaryActions, [
        {
          label: "Back",
          icon: icon.back,
          color: "#f3dfd8",
          disabled: state.loadingSelection || !hasPlan || currentIndex <= 0,
          onClick: showPreviousNight
        },
        {
          label: "Forward",
          icon: icon.forward,
          color: "#dce6dd",
          disabled: state.loadingSelection || !hasPlan || currentIndex < 0 || currentIndex >= state.planRows.length - 1,
          onClick: showNextNight
        },
        {
          label: "Pause",
          icon: icon.pause,
          color: "#f2eadb",
          disabled: state.loadingSelection || !hasPlan || !canPauseSelection(),
          onClick: pauseTonight
        }
      ], false);

      renderActions(secondaryActions, SECONDARY_ACTION_ITEMS.map((item) => ({
        ...item,
        onClick: item.href
          ? () => window.location.assign(item.href)
          : () => showToast(item.message)
      })), false);
    }

    function renderActions(target, items, featured) {
      target.innerHTML = "";
      items.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "action-button" + (featured ? " featured" : "");
        button.style.setProperty("--action-bg", item.color);
        button.disabled = Boolean(item.disabled);
        button.innerHTML = `
          <span class="action-icon">${item.icon}</span>
          <span class="action-label">${item.label}</span>
        `;
        button.addEventListener("click", () => {
          if (item.disabled) return;
          if (typeof item.onClick === "function") {
            item.onClick();
            return;
          }
          if (item.message) {
            showToast(item.message);
          }
        });
        target.appendChild(button);
      });
    }

    function renderModes() {
      modeToggle.innerHTML = "";
      Object.entries(MODE_LABELS).forEach(([key, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mode-pill" + (state.mode === key ? " active" : "");
        button.textContent = label;
        button.disabled = state.syncingMode;
        button.setAttribute("aria-pressed", String(state.mode === key));
        button.addEventListener("click", () => {
          if (state.mode === key || state.syncingMode) return;
          updateMode(key);
        });
        modeToggle.appendChild(button);
      });
    }

    function renderViewContext() {
      const assignment = (state.payload && state.payload.assignment) || {};
      const row = currentPlanRow();
      const label = assignment.nightLabel || (row && row.night) || "";
      const date = assignment.date || (row && row.date) || "";
      const parts = [];

      if (label) {
        parts.push(isPreviewing() ? `Viewing ${label}` : `Tonight - ${label}`);
      } else if (isPreviewing()) {
        parts.push("Viewing selected night");
      } else {
        parts.push(`${MODE_LABELS[state.mode]} mode`);
      }

      if (date) {
        parts.push(formatShortDate(date));
      } else if (isPreviewing()) {
        parts.push("Date not set");
      }

      viewContext.hidden = !parts.length;
      viewContext.textContent = parts.join(" - ");
    }

    function renderSections() {
      const sections = state.payload && state.payload.routine && state.payload.routine.sections ? state.payload.routine.sections : [];
      stepSections.innerHTML = "";

      if (!sections.length) {
        if (state.loadingInitial) {
          return;
        }
        const empty = document.createElement("p");
        empty.className = "step-empty";
        empty.textContent = "This mode is mapped, but its step list has not been structured yet.";
        stepSections.appendChild(empty);
        return;
      }

      let stepIndex = 0;
      sections.forEach((sectionData) => {
        const section = document.createElement("section");
        const meta = SECTION_STYLES[sectionData.key] || SECTION_STYLES.block;
        const sectionLabel = sectionData.label || meta.label || "Section";
        const header = document.createElement("div");
        header.className = "section-header";
        header.innerHTML = `<span class="section-dot" style="background:${meta.color}"></span>${sectionLabel}`;
        section.appendChild(header);

        const list = document.createElement("ol");
        list.className = "step-list";

        (sectionData.steps || []).forEach((step) => {
          stepIndex += 1;
          const item = document.createElement("li");
          const row = document.createElement("div");
          row.className = "step-row";
          row.style.setProperty("--step-color", meta.color);
          row.innerHTML = `
            <span class="step-index">${stepIndex}</span>
            <span class="step-copy">
              <span class="step-name">${step.product || step.name || "Routine step"}</span>
              <span class="step-type">${step.type || sectionData.label || "Step"}</span>
              <span class="step-notes">${step.notes || ""}</span>
            </span>
            <span></span>
          `;
          item.appendChild(row);
          list.appendChild(item);
        });

        section.appendChild(list);
        stepSections.appendChild(section);
      });
    }

    function renderLogCard() {
      if (state.loadingInitial) {
        logTitle.textContent = "Loading last night...";
        logMeta.textContent = "";
        logCard.disabled = true;
        return;
      }

      const log = state.payload && state.payload.yesterday && state.payload.yesterday.log ? state.payload.yesterday.log : null;

      if (!log) {
        logTitle.textContent = "Last night has not been logged yet.";
        logMeta.textContent = "The 2:00 AM submission job will populate this once logging is wired.";
        logCard.disabled = true;
        return;
      }

      logTitle.textContent = `Last night: ${log.blockName}`;
      logMeta.textContent = log.canEdit
        ? `${log.completion} - Tap to edit within the 24-hour window.`
        : `${log.completion} - Edit window closed.`;
      logCard.disabled = false;
    }

      function renderPayload() {
        const payload = state.payload || (state.loadingInitial ? LOADING_PAYLOAD : FALLBACK_PAYLOAD);
        const cycle = payload.cycle || FALLBACK_PAYLOAD.cycle;
        const routine = payload.routine || FALLBACK_PAYLOAD.routine;
        const next = payload.next || FALLBACK_PAYLOAD.next;
      const currentDevices = routineDeviceNames(routine);
      const row = currentPlanRow();
      const totalRows = state.planRows.length;
      const currentIndex = currentPlanIndex();
      const progressValue = row && totalRows
        ? Math.round((((row.nightOrder != null ? row.nightOrder : currentIndex + 1) || 1) / totalRows) * 100)
        : (cycle.progressPercent || 0);

        cycleName.textContent = cycle.name || "Skincare Cycle";
        cycleMeta.textContent = row && totalRows
          ? `${row.night || `Night ${currentIndex + 1}`} of ${totalRows}`
          : (state.loadingInitial ? "Loading..." : `Night ${cycle.nightNumber || 1} of ${cycle.totalNights || 90}`);
        progressFill.style.width = `${state.loadingInitial ? 0 : progressValue}%`;

        blockName.textContent = routine.blockName || (state.loadingInitial ? "\u00A0" : "Tonight");
      if (currentDevices.length) {
        deviceBadge.hidden = false;
        deviceBadge.textContent = currentDevices.join(" / ");
      } else {
        deviceBadge.hidden = true;
      }

        blockNote.textContent = routine.note || (state.loadingInitial ? "" : "Tonight's note will appear here once the selected routine carries note text.");

        nextBlockName.textContent = next.blockName || (state.loadingInitial ? "" : "TBD");
        nextDeviceName.textContent = state.loadingInitial ? "" : nextDeviceText(next);

      renderModes();
      renderViewContext();
      renderSections();
      renderLogCard();
      updateQuickActionButtons();
    }

    async function fetchJson(path, init) {
      const nextInit = { ...(init || {}) };
      nextInit.credentials = "omit";
      const method = String(nextInit.method || "GET").toUpperCase();
      const headers = new Headers(nextInit.headers || {});

      if (method !== "GET" && method !== "HEAD" && nextInit.body != null && !headers.has("Content-Type")) {
        headers.set("Content-Type", "application/json");
      }

      if ([...headers.keys()].length) {
        nextInit.headers = headers;
      } else {
        delete nextInit.headers;
      }

      const response = await fetch(`${API_BASE}${path}`, nextInit);

      const text = await response.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = {};
      }

      if (!response.ok || data.ok === false) {
        const message = data && data.details && data.details.message
          ? data.details.message
          : data.error || "Unable to reach the Skincare API right now.";
        throw new Error(message);
      }

      return data;
    }

    async function prefetchAssignment(assignmentId) {
      if (!assignmentId) return;

      const key = cacheKey(assignmentId, state.mode);
      if (state.previewCache.has(key) || state.prefetching.has(key)) {
        return;
      }

      state.prefetching.add(key);

      try {
        const data = await fetchJson(`/api/routine-assignment?id=${encodeURIComponent(assignmentId)}&mode=${encodeURIComponent(state.mode)}`);
        rememberPreview(data);
      } catch {
        // Quietly skip speculative prefetch failures.
      } finally {
        state.prefetching.delete(key);
      }
    }

    function prefetchAdjacentAssignments() {
      const currentIndex = currentPlanIndex();
      if (currentIndex < 0) return;

      const previousRow = state.planRows[currentIndex - 1];
      const nextRow = state.planRows[currentIndex + 1];

      if (previousRow && previousRow.id) {
        prefetchAssignment(previousRow.id);
      }

      if (nextRow && nextRow.id) {
        prefetchAssignment(nextRow.id);
      }
    }

    async function loadRoutinePlan() {
      try {
        const data = await fetchJson("/api/routine-plan");
        state.planRows = Array.isArray(data.rows) && data.rows.length ? data.rows : [...FALLBACK_PLAN_ROWS];
      } catch (error) {
        state.planRows = [...FALLBACK_PLAN_ROWS];
      }

      const todayRow = state.planRows.find((row) => row.isToday) || state.planRows[0] || null;
      state.todayAssignmentId = state.payload && state.payload.assignment && state.payload.assignment.id
        ? state.payload.assignment.id
        : (todayRow && todayRow.id) || state.todayAssignmentId;

      if (!state.activeAssignmentId || !state.planRows.some((row) => row.id === state.activeAssignmentId)) {
        state.activeAssignmentId = state.todayAssignmentId;
      }

      renderPayload();
      prefetchAdjacentAssignments();
    }

      async function loadTonightData(options = {}) {
        const shouldRender = options.render !== false;

        try {
          const data = await fetchJson("/api/tonight");
        state.payload = data;
        state.mode = data.mode || state.mode;
        if (data.assignment && data.assignment.id) {
          state.todayAssignmentId = data.assignment.id;
          state.activeAssignmentId = data.assignment.id;
          }
          rememberPreview(data);
          state.loadingInitial = false;
          state.usingFallback = false;
          hideStatus();
        } catch (error) {
          state.payload = {
            ...FALLBACK_PAYLOAD,
            mode: state.mode
          };
          state.loadingInitial = false;
          state.usingFallback = true;
          state.todayAssignmentId = FALLBACK_PLAN_ROWS[0].id;
        state.activeAssignmentId = FALLBACK_PLAN_ROWS[0].id;
        showStatus(fallbackStatusMessage(error.message));
      }

      if (shouldRender) {
        renderPayload();
        prefetchAdjacentAssignments();
      }
    }

    async function loadAssignmentPreview(assignmentId, options = {}) {
      if (!assignmentId || state.loadingSelection) return;

      const cached = state.previewCache.get(cacheKey(assignmentId, state.mode));
      if (cached) {
        state.payload = {
          ...(state.payload || {}),
          ...clonePayload(cached),
          cycle: state.payload ? state.payload.cycle : null,
          yesterday: state.payload ? state.payload.yesterday : null
        };
        state.activeAssignmentId = cached.assignment && cached.assignment.id ? cached.assignment.id : assignmentId;
        renderPayload();
        prefetchAdjacentAssignments();

        if (options.message) {
          showToast(options.message);
        }
        return;
      }

      state.loadingSelection = true;
      updateQuickActionButtons();

      try {
        const data = await fetchJson(`/api/routine-assignment?id=${encodeURIComponent(assignmentId)}&mode=${encodeURIComponent(state.mode)}`);
        state.payload = {
          ...(state.payload || {}),
          ...data,
          cycle: state.payload ? state.payload.cycle : null,
          yesterday: state.payload ? state.payload.yesterday : null
        };
        state.activeAssignmentId = data.assignment && data.assignment.id ? data.assignment.id : assignmentId;
        rememberPreview(data);
        renderPayload();
        prefetchAdjacentAssignments();

        if (options.message) {
          showToast(options.message);
        }
      } catch (error) {
        showToast(error.message);
      } finally {
        state.loadingSelection = false;
        updateQuickActionButtons();
      }
    }

    async function pauseTonight() {
      if (!canPauseSelection() || state.loadingSelection) return;

      state.loadingSelection = true;
      updateQuickActionButtons();

      try {
        const data = await fetchJson("/api/pause", {
          method: "POST",
          body: JSON.stringify({
            assignmentId: state.activeAssignmentId
          })
        });

        state.payload = data;
        state.mode = data.mode || state.mode;
        if (data.assignment && data.assignment.id) {
          state.todayAssignmentId = data.assignment.id;
          state.activeAssignmentId = data.assignment.id;
        }
        rememberPreview(data);

        await loadRoutinePlan();
        showToast(`Paused ${data.pauseAction && data.pauseAction.pausedNight ? data.pauseAction.pausedNight : "tonight"} until 2:00 AM ET.`);
      } catch (error) {
        showToast(error.message);
      } finally {
        state.loadingSelection = false;
        updateQuickActionButtons();
      }
    }

    function showPreviousNight() {
      const currentIndex = currentPlanIndex();
      if (currentIndex <= 0) return;
      const previousRow = state.planRows[currentIndex - 1];
      loadAssignmentPreview(previousRow.id, { message: `Viewing ${previousRow.night || "previous night"}.` });
    }

    function showNextNight() {
      const currentIndex = currentPlanIndex();
      if (currentIndex < 0 || currentIndex >= state.planRows.length - 1) return;
      const nextRow = state.planRows[currentIndex + 1];
      loadAssignmentPreview(nextRow.id, { message: `Viewing ${nextRow.night || "next night"}.` });
    }

    async function updateMode(nextMode) {
      const previousMode = state.mode;
      const selectedAssignmentId = state.activeAssignmentId;
      state.mode = nextMode;
      state.syncingMode = true;
      updateQuickActionButtons();
      renderModes();

      try {
        await fetchJson("/api/mode", {
          method: "PUT",
          body: JSON.stringify({ mode: nextMode })
        });
        await loadTonightData({ render: false });

        if (selectedAssignmentId && selectedAssignmentId !== state.todayAssignmentId) {
          await loadAssignmentPreview(selectedAssignmentId);
        } else {
          renderPayload();
        }

        showToast(`${MODE_LABELS[nextMode]} mode active.`);
      } catch (error) {
        state.mode = previousMode;
        renderModes();
        showToast(error.message);
      } finally {
        state.syncingMode = false;
        updateQuickActionButtons();
        renderModes();
      }
    }

    logCard.addEventListener("click", () => {
      if (logCard.disabled) return;
      showToast("Yesterday editing will be unlocked once the log update flow is wired.");
    });

    async function bootstrapPage() {
      renderPayload();

      if (window.WellnessAuth && window.WellnessAuth.ready) {
        await window.WellnessAuth.ready;
      }

      await loadTonightData();
      await loadRoutinePlan();
    }

    bootstrapPage().catch((error) => {
      showStatus(fallbackStatusMessage(error && error.message));
    });
  </script>
</body>
</html>
