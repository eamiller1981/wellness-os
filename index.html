<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5eae3">
  <meta name="description" content="Wellness OS home screen.">
  <title>Wellness OS</title>
  <style>
    :root {
      --bg: #f5eae3;
      --ink: #806f64;
      --muted: #a39289;
      --surface: rgba(255, 255, 255, 0.34);
      --line: rgba(128, 111, 100, 0.18);
      --radius: 8px;
      --gap: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      padding: 16px 28px;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
    }

    a {
      color: inherit;
    }

    .home {
      width: min(900px, 100%);
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    .header {
      display: flex;
      justify-content: center;
    }

    .header-image {
      width: 278px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .date-link {
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .date-link:hover,
    .date-link:focus-visible {
      color: #5f514a;
      border-color: #5f514a;
      background: rgba(255, 255, 255, 0.48);
      outline: none;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .search svg {
      width: 17px;
      height: 17px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      margin-top: 4px;
    }

    .card {
      display: block;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(80, 60, 50, 0.12);
      outline: none;
    }

    .card:active {
      transform: translateY(-1px);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card[hidden],
    .empty[hidden] {
      display: none;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1)  { animation-delay: 0.04s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.16s; }
    .card:nth-child(4)  { animation-delay: 0.22s; }
    .card:nth-child(5)  { animation-delay: 0.28s; }
    .card:nth-child(6)  { animation-delay: 0.34s; }
    .card:nth-child(7)  { animation-delay: 0.40s; }
    .card:nth-child(8)  { animation-delay: 0.46s; }
    .card:nth-child(9)  { animation-delay: 0.52s; }
    .card:nth-child(10) { animation-delay: 0.58s; }
    .card:nth-child(11) { animation-delay: 0.64s; }
    .card:nth-child(12) { animation-delay: 0.70s; }
    .card:nth-child(13) { animation-delay: 0.76s; }

    @media (max-width: 599px) {
      body {
        padding: 10px 14px;
      }

      .home {
        min-height: calc(100vh - 20px);
        justify-content: start;
        padding-top: 0;
        gap: 8px;
      }

      .header {
        justify-content: center;
      }

      .header-image {
        width: 235px;
      }

      .controls {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .date-link {
        order: 1;
      }

      .search {
        order: 2;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 2px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
  <link rel="icon" href="assets/favicons/wellness.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicons/wellness-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicons/wellness-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script src="app-auth.js"></script>
</head>
<body>
  <main class="home">
    <header class="header">
      <img class="header-image" src="assets/header-logo.png" alt="Wellness OS">
    </header>

    <div class="controls">
      <label class="search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Zm5.6.1 4.1 4.1-1.4 1.4-4.1-4.1 1.4-1.4Z" fill="currentColor"/>
        </svg>
        <input id="spaceSearch" type="search" placeholder="Search" autocomplete="off" aria-label="Search spaces">
      </label>
      <a class="date-link" id="dateLink" href="daily-planner.html">Today</a>
    </div>

    <nav class="grid" aria-label="Wellness spaces">
      <a href="daily-planner.html" class="card" data-title="Daily Planner"><img src="assets/10.png" alt="Daily Planner"></a>
      <a href="goals.html" class="card" data-title="Goals"><img src="assets/10.png" alt="Goals"></a>
      <a href="dashboard.html" class="card" data-title="Dashboard"><img src="assets/11.png" alt="Dashboard"></a>
      <a href="meals.html" class="card" data-title="Meals"><img src="assets/1.png" alt="Meals"></a>
      <a href="learning.html" class="card" data-title="Learn"><img src="assets/2.png" alt="Learn"></a>
      <a href="skincare.html" class="card" data-title="Skincare"><img src="assets/3.png" alt="Skincare"></a>
      <a href="/budget-abroad/biweekly" class="card" data-title="Finances"><img src="assets/4.png" alt="Finances"></a>
      <a href="reading.html" class="card" data-title="Reading"><img src="assets/5.png" alt="Reading"></a>
      <a href="events.html" class="card" data-title="Events"><img src="assets/6.png" alt="Events"></a>
      <a href="fitness.html" class="card" data-title="Fitness"><img src="assets/7.png" alt="Fitness"></a>
      <a href="beauty.html" class="card" data-title="Beauty"><img src="assets/8.png" alt="Beauty"></a>
      <a href="body-comp.html" class="card" data-title="Body Composition Body Comp"><img src="assets/9.png" alt="Body Comp"></a>
      <a href="vlog.html" class="card" data-title="Vlog"><img src="assets/vlog.png" alt="Vlog"></a>
    </nav>

    <p class="empty" id="emptyState" hidden>No matches.</p>
  </main>

  <script>
    const dateLink = document.getElementById("dateLink");
    const dateFormatter = new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      month: "short",
      day: "numeric"
    });

    dateLink.textContent = dateFormatter.format(new Date());

    const search = document.getElementById("spaceSearch");
    const cards = Array.from(document.querySelectorAll(".card"));
    const empty = document.getElementById("emptyState");

    search.addEventListener("input", () => {
      const query = search.value.trim().toLowerCase();
      let matches = 0;

      cards.forEach((card) => {
        const isMatch = card.dataset.title.toLowerCase().includes(query);
        card.hidden = !isMatch;
        if (isMatch) matches += 1;
      });

      empty.hidden = matches > 0;
    });
  </script>
</body>
</html>
