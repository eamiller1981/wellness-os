<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness OS</title>
  <style>
    :root {
      --bg: #f5eae3;
      --card-radius: 16px;
      --gap: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 560px;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    .card {
      display: block;
      border-radius: var(--card-radius);
      overflow: hidden;
      text-decoration: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      aspect-ratio: 1 / 1;
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(80, 60, 50, 0.12);
    }

    .card:active {
      transform: translateY(-1px);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1)  { animation-delay: 0.04s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.16s; }
    .card:nth-child(4)  { animation-delay: 0.22s; }
    .card:nth-child(5)  { animation-delay: 0.28s; }
    .card:nth-child(6)  { animation-delay: 0.34s; }
    .card:nth-child(7)  { animation-delay: 0.40s; }
    .card:nth-child(8)  { animation-delay: 0.46s; }
    .card:nth-child(9)  { animation-delay: 0.52s; }
    .card:nth-child(10) { animation-delay: 0.58s; }
    .card:nth-child(11) { animation-delay: 0.64s; }
    .card:nth-child(12) { animation-delay: 0.70s; }

    @media (max-width: 480px) {
      body { padding: 14px; }
      .grid { gap: 12px; }
      .card { border-radius: 12px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="grid">

      <!-- Row 1 -->
      <a href="#" class="card"><img src="assets/1.png" alt="Wellness OS"></a>
      <a href="#" class="card"><img src="assets/2.png" alt="Dashboard"></a>

      <!-- Row 2 -->
      <a href="#" class="card"><img src="assets/3.png" alt="Skincare"></a>
      <a href="#" class="card"><img src="assets/4.png" alt="Learning"></a>

      <!-- Row 3 -->
      <a href="#" class="card"><img src="assets/5.png" alt="Meals"></a>
      <a href="#" class="card"><img src="assets/6.png" alt="Finances"></a>

      <!-- Row 4 -->
      <a href="#" class="card"><img src="assets/7.png" alt="Reading"></a>
      <a href="#" class="card"><img src="assets/8.png" alt="Fitness"></a>

      <!-- Row 5 -->
      <a href="#" class="card"><img src="assets/9.png" alt="Beauty"></a>
      <a href="#" class="card"><img src="assets/10.png" alt="Events"></a>

      <!-- Row 6 -->
      <a href="#" class="card"><img src="assets/11.png" alt="Body Comp"></a>
      <a href="#" class="card"><img src="assets/12.png" alt="Goals"></a>

    </div>
  </div>

</body>
</html>
